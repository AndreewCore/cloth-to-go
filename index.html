<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>CLOTH TO GO · Alquiler de Ropa</title>
<link rel="stylesheet" href="css/base.css" />
<link rel="stylesheet" href="css/components.css" />
</head>
<body>
<div class="phone">
  <div class="notch"></div>

  <!-- Pantalla de bienvenida -->
  <div class="login" id="login">
    <div class="login-card">
      <span class="login-mark">
        <img src="img/Cloth%20To%20Go%20Logo.png" alt="Logo CLOTH TO GO" />
      </span>
      <div class="login-logo">CLOTH TO <span>GO</span></div>
      <p class="login-sub">Moda circular · alquila por día 🌱</p>
      <button class="login-guest" id="guestBtn">Entrar como invitado</button>
      <div class="login-alt">
        <button class="login-alt-btn" id="signinBtn">Iniciar sesión</button>
        <button class="login-alt-btn" id="signupBtn">Crear cuenta</button>
      </div>
      <p class="login-hint" id="loginHint" role="status" hidden>Muy pronto podrás crear tu cuenta.</p>
    </div>
  </div>

  <header>
    <div class="brand">
      <div class="brand-id">
        <span class="brand-logo">
          <img src="img/Cloth%20To%20Go%20Logo.png" alt="Logo CLOTH TO GO" />
        </span>
        <div class="brand-text">
          <h1>CLOTH TO <span>GO</span></h1>
          <div class="tagline" id="greeting">Moda circular · paga por día 🌱</div>
        </div>
      </div>
      <div class="brand-actions">
        <button class="icon-btn" id="openSurvey" aria-label="Responder encuesta">📝</button>
        <button class="icon-btn" id="openProfile" aria-label="Mi perfil">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="8" r="3.6"/><path d="M5 20a7 7 0 0 1 14 0"/>
          </svg>
        </button>
        <button class="cart-btn" id="openCart" aria-label="Ver carrito">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="9" cy="20" r="1.5"/><circle cx="18" cy="20" r="1.5"/>
            <path d="M3 4h2l2.3 12.2a1 1 0 0 0 1 .8h9a1 1 0 0 0 1-.82L20.5 8H6"/>
          </svg>
          <span class="cart-badge" id="badge" style="display:none">0</span>
        </button>
      </div>
    </div>
    <div class="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/>
      </svg>
      <input type="search" id="searchInput" placeholder="Buscar prenda…" />
    </div>
    <div class="filters" id="filters"></div>
    <div class="cat-toolbar">
      <button class="filter-toggle" id="openFilters" aria-label="Abrir filtros">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/>
          <circle cx="9" cy="6" r="2.4" fill="var(--card)"/><circle cx="15" cy="12" r="2.4" fill="var(--card)"/><circle cx="8" cy="18" r="2.4" fill="var(--card)"/>
        </svg>
        Filtros
        <span class="filter-count" id="filterCount" style="display:none">0</span>
      </button>
      <label class="sort-inline" aria-label="Ordenar por">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M7 5v14M7 19l-3-3M7 19l3-3"/><path d="M17 19V5M17 5l-3 3M17 5l3 3"/>
        </svg>
        <select id="sortBy">
          <option value="default">Recomendado</option>
          <option value="price-asc">Precio: más bajo</option>
          <option value="price-desc">Precio: más alto</option>
          <option value="stars-desc">Mejor calidad</option>
        </select>
      </label>
    </div>
  </header>

  <main>
    <div class="results-bar" id="resultsBar"></div>
    <div class="grid" id="grid"></div>
    <div class="no-results" id="noResults" style="display:none">
      No encontramos prendas para tu búsqueda.
    </div>
  </main>

  <!-- Overlay + Sheet -->
  <div class="overlay" id="overlay"></div>
  <div class="sheet" id="sheet">
    <div class="grip"></div>
    <div class="sheet-head">
      <button class="back-x" id="backBtn" aria-label="Atrás" style="display:none">&larr;</button>
      <h2 id="sheetTitle">Tu carrito</h2>
      <button class="close-x" id="closeSheet" aria-label="Cerrar">&times;</button>
    </div>
    <div class="sheet-body" id="sheetBody"></div>
    <div class="sheet-foot" id="sheetFoot"></div>
  </div>

  <div class="toast" id="toast"></div>

<!-- Pop-up de ahorro de agua (al confirmar un alquiler) -->
  <div class="modal-overlay water-pop" id="waterPop">
    <div class="modal water-card" role="dialog" aria-modal="true" aria-labelledby="waterTitle">
      <div class="water-drop">💧</div>
      <h3 class="water-title" id="waterTitle">¡Felicidades!</h3>
      <p class="water-amount" id="waterAmount"></p>
      <p class="water-msg" id="waterMsg"></p>
      <button class="modal-btn ok" id="waterClose">¡Genial! 🌱</button>
    </div>
  </div>

<!-- Modal de confirmación in-app (reemplaza confirm() nativo) -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modalText">
      <div class="modal-icon" id="modalIcon" style="display:none" aria-hidden="true"></div>
      <p class="modal-text" id="modalText"></p>
      <div class="modal-actions">
        <button class="modal-btn cancel" id="modalCancel">Cancelar</button>
        <button class="modal-btn ok" id="modalOk">Confirmar</button>
      </div>
    </div>
  </div>
</div>

<!-- Carga en orden de dependencias:
     data → state → dom → vistas (catalog/checkout/profile) → main (init) -->
<script src="js/data.js"></script>
<script src="js/state.js"></script>
<script src="js/dom.js"></script>
<script src="js/catalog.js"></script>
<script src="js/checkout.js"></script>
<script src="js/profile.js"></script>
<script src="js/main.js"></script>
</body>
</html>
